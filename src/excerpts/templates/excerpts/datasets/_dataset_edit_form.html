<div class="card">
    <div class="card-header">
        <h2>Edit Dataset</h2>
    </div>
    <div class="card-body">
        <form method="post" hx-post="{% url 'edit_dataset' dataset.id %}" hx-target="#dataset-content">
            {% csrf_token %}
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ dataset.name }}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ dataset.description }}</textarea>
            </div>
            <div class="d-flex justify-content-between">
                <a href="{% url 'datasets' %}" 
                   class="btn btn-secondary"
                   hx-get="{% url 'datasets' %}"
                   hx-target="#dataset-content"
                   hx-push-url="true">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

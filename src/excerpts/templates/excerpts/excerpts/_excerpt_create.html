<form
	id="excerpt-add"
	hx-post="{% url 'create_excerpt' %}"
	hx-target="#excerpt-list"
	hx-on::after-request="if(event.detail.successful) this.reset()"
>
	{% csrf_token %}

	<input type="text" name="excerpt_content" placeholder="Add an excerpt{% if active_dataset_info %} to {{ active_dataset_info.name }}{% endif %}" />

	<button type="submit">Add</button>
	
	{% if not active_dataset_info %}
	<div class="alert alert-warning mt-2">
		<small>No active dataset selected. <a href="{% url 'datasets' %}">Select or create a dataset</a> to organize your excerpts.</small>
	</div>
	{% endif %}
</form>
